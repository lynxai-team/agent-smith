description: "General agent: sandboxed shell access and filesystem write, web search subagents"
category: system
prompt: |-
    {prompt}
model: qwen4b
inferParams:
    min_p: 0
    top_k: 20
    top_p: 0.95
    temperature: 0.4
variables:
  required:
    workspace:
      description: The local directory path where to operate
toolsList:
  - shell
  - python
  - searchweb
